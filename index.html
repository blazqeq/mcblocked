<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Discord Login Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #2c2f33; color: white; }
        .login-btn { background: #5865F2; padding: 15px 30px; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        #profile { display: none; }
        img { border-radius: 50%; width: 100px; }
    </style>
</head>
<body>

    <h1>Velkommen til min side</h1>

    <!-- Login knap -->
    <a id="login-link" href="https://discord.com/oauth2/authorize?client_id=1506775876447113236&response_type=code&redirect_uri=https%3A%2F%2Fblazqeq.github.io%2Ftest%2F&scope=email+identify" class="login-btn">Log ind med Discord</a>

    <!-- Profil visning (skjult som standard) -->
    <div id="profile">
        <img id="avatar" src="" alt="Logo">
        <h2 id="username"></h2>
    </div>

    <script>
        // Tjekker om der er en 'code' i URL'en
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('profile').style.display = 'block';
            document.getElementById('username').innerText = "Velkommen, Discord bruger!";
            // Bemærk: For at få rigtigt navn/billede skal du bruge en backend (Node.js/Python) 
            // til at bytte 'code' til et 'token'.
        }
    </script>
</body>
</html>
