<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Discord Login Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #profile { display: none; }
        .red-button { 
            background-color: #ff4d4d; color: white; border: none; 
            padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Login knap -->
    <a id="loginBtn" href="https://discord.com/oauth2/authorize?client_id=1506775876447113236&response_type=code&redirect_uri=https%3A%2F%2Fblazqeq.github.io%2Ftest%2F&scope=identify">
        Log ind med Discord
    </a>

    <!-- Profil visning -->
    <div id="profile">
        <img id="avatar" src="" alt="Profilbillede" width="100" style="border-radius: 50%;">
        <h2 id="username"></h2>
        <button class="red-button" onclick="logout()">Log ud</button>
    </div>

    <script>
        // Log ud funktion
        function logout() {
            localStorage.clear();
            location.reload();
        }

        // Tjek om brugeren er logget ind (Simuleret visning)
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('profile').style.display = 'block';
            document.getElementById('username').innerText = user.username;
            document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
        }
    </script>
</body>
</html>
