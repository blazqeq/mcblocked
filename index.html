<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Forum System | Professionel</title>
    <style>
        /* Baggrund og font */
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white; height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        /* Glassmorphism panel */
        .container { 
            background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Awesome knapper */
        .btn { 
            padding: 15px 30px; margin: 10px; border: none; border-radius: 50px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            background: #5865F2; color: white; text-transform: uppercase;
        }
        .btn:hover { background: #4752C4; transform: scale(1.05); }

        /* Modal styling */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { 
            background: #252a34; width: 400px; margin: 15% auto; padding: 30px; 
            border-radius: 15px; text-align: center; border: 2px solid #5865F2;
        }
        textarea { width: 90%; height: 100px; border-radius: 10px; padding: 10px; background: #1a1a2e; color: white; border: 1px solid #5865F2; }
    </style>
</head>
<body>

    <div class="container" id="loginSection">
        <h1>Velkommen</h1>
        <p>Log ind med Discord for at få adgang til vores ansøgningscenter.</p>
        <a href="https://discord.com/oauth2/authorize?client_id=1506775876447113236&response_type=code&redirect_uri=https%3A%2F%2Fblazqeq.github.io%2Ftest%2F&scope=identify" style="text-decoration: none;">
            <button class="btn">Log ind med Discord</button>
        </a>
    </div>

    <div class="container" id="appSection" style="display:none;">
        <h1>Ansøgnings Center</h1>
        <button class="btn" onclick="openModal('Hjælper')">Hjælper</button>
        <button class="btn" onclick="openModal('Unban')">Unban</button>
        <button class="btn" onclick="openModal('Content Creator')">Content Creator</button>
    </div>

    <div id="formModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Formular</h2>
            <textarea id="appInput" placeholder="Skriv din ansøgning her..."></textarea><br><br>
            <button class="btn" onclick="submitForm()">Send Ansøgning</button>
            <button class="btn" style="background: #e91e63;" onclick="closeModal()">Luk</button>
        </div>
    </div>

    <script>
        const webhookUrl = "https://discord.com/api/webhooks/1506777158264029294/vCC4G5BGzWzbsSZIfC8L1xgsiCAA8UXQBWzbyTWEuujFb6VNbHRZzuUSAWiPeQdwzuUo";
        let currentType = "";

        // Tjek om vi er logget ind
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('code')) {
            localStorage.setItem('loggedIn', 'true');
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        if (localStorage.getItem('loggedIn') === 'true') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
        }

        function openModal(type) {
            currentType = type;
            document.getElementById('modalTitle').innerText = "Ansøgning: " + type;
            document.getElementById('formModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('formModal').style.display = 'none'; }

        function submitForm() {
            const text = document.getElementById('appInput').value;
            fetch(webhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: `🚀 **Ny ansøgning: ${currentType}**\n📝 Besked: ${text}` })
            }).then(() => {
                alert("Din ansøgning er sendt afsted! 📬");
                closeModal();
            });
        }
    </script>
</body>
</html>
