<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>MongoTV Hub</title>
    <style>
        body {
            margin: 0;
            background-color: #0f0f0f;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            width: 90%;
            max-width: 850px;
            text-align: center;
            padding: 40px;
            background: #161616;
            border-radius: 24px;
            border: 1px solid #333;
        }

        h1 { margin-bottom: 20px; font-weight: 700; }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            margin-bottom: 30px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .sub-btn {
            display: inline-block;
            background-color: #ff0000;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .sub-btn:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>MongoTV</h1>
        
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/OT36AdluC-I?si=bygb7L17nkCNDSEo" 
                title="YouTube video"
                allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>
        </div>

        <a href="https://www.youtube.com/@MongoTV" target="_blank" class="sub-btn">
            Subscribe på YouTube
        </a>
    </div>

</body>
</html>
